---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: raihanakbartampansekali/suilens-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5173
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
    - port: 5173
      targetPort: 5173
      nodePort: 30173
---
apiVersion: batch/v1
kind: Job
metadata:
  name: catalog-seed
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: seed
          image: raihanakbartampansekali/suilens-catalog-service:latest
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c", "bun run src/db/seed.ts"]
          env:
            - name: DATABASE_URL
              valueFrom:
                configMapKeyRef:
                  name: suilens-config
                  key: CATALOG_DB_URL