                  key: ORDER_DB_URL
            - name: CATALOG_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: suilens-config
                  key: CATALOG_SERVICE_URL
            - name: RABBITMQ_URL
              valueFrom:
                configMapKeyRef:
                  name: suilens-config
                  key: RABBITMQ_URL
          ports:
            - containerPort: 3002
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
spec:
  selector:
    app: order-service
  ports:
    - port: 3002
      targetPort: 3002
---
