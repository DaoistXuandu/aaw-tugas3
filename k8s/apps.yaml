---
apiVersion: batch/v1
kind: Job
metadata:
  name: catalog-seed
spec:
  template:
    spec:
      restartPolicy: OnFailure
      nodeSelector:
        kubernetes.io/hostname: worker-node-2
      containers:
        - name: seed
          image: raihanakbartampansekali/suilens-catalog-service:latest
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c", "bun run src/db/seed.ts"]
          env:
            - name: DATABASE_URL
              valueFrom:
                configMapKeyRef:
                  name: suilens-config
                  key: CATALOG_DB_URL