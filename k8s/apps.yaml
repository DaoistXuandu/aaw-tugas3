apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: catalog-service
  template:
    metadata:
      labels:
        app: catalog-service
    spec:
      nodeSelector:
        kubernetes.io/hostname: worker-node-2
      initContainers:
        - name: wait-catalog-db
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c", "until pg_isready -h catalog-db -p 5432 -U catalog; do sleep 2; done"]
      containers:
        - name: catalog-service
          image: raihanakbartampansekali/suilens-catalog-service:latest
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c", "bunx drizzle-kit push && bun run src/index.ts"]
          env:
            - name: DATABASE_URL
              valueFrom:
                configMapKeyRef:
                  name: suilens-config
                  key: CATALOG_DB_URL
          ports:
            - containerPort: 3001
---
apiVersion: v1
kind: Service
metadata:
  name: catalog-service
spec:
  selector:
    app: catalog-service
  ports:
    - port: 3001
      targetPort: 3001
---
